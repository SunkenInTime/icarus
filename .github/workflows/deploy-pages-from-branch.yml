name: Deploy Pages From Branch

on:
  push:
    branches:
      - gh-pages
  workflow_dispatch:
    inputs:
      pages_branch:
        description: Branch that contains the static Pages content.
        required: true
        default: gh-pages
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: github-pages

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.pages_branch || github.ref_name }}
          fetch-depth: 1

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - uses: actions/deploy-pages@v4
