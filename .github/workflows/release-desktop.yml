name: Release Desktop

on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: Version bump to apply before building.
        type: choice
        required: true
        default: patch
        options:
          - none
          - patch
          - minor
          - major
      channel:
        description: Desktop updater channel.
        type: choice
        required: true
        default: stable
        options:
          - stable
          - prerelease
      mandatory:
        description: Mark the desktop update as mandatory.
        type: boolean
        required: true
        default: false
      publish_pages:
        description: Deploy the staged desktop updater manifest and installer downloads to GitHub Pages.
        type: boolean
        required: true
        default: true
      release_title:
        description: Title used if a new metadata file is created.
        type: string
        required: false
        default: ""
      change_message:
        description: First change entry used if a new metadata file is created.
        type: string
        required: false
        default: "Replace this with the desktop release summary."

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dart-lang/setup-dart@v1

      - name: Add Pub Cache To PATH
        shell: pwsh
        run: |
          "$env:LOCALAPPDATA\Pub\Cache\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install FVM
        shell: pwsh
        run: dart pub global activate fvm

      - name: Install Flutter SDK
        shell: pwsh
        run: fvm install

      - name: Run Desktop Release Script
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $args = @(
            "-ExecutionPolicy", "Bypass",
            "-File", "scripts/release_desktop.ps1",
            "-VersionBump", "${{ inputs.version_bump }}",
            "-Channel", "${{ inputs.channel }}",
            "-ChangeMessage", "${{ inputs.change_message }}"
          )

          if ("${{ inputs.publish_pages }}" -eq "true") {
            $args += @("-PublishPages", "-PagesPublishMode", "git-branch")
          }

          if ("${{ inputs.mandatory }}" -eq "true") {
            $args += "-Mandatory"
          }

          if (-not [string]::IsNullOrWhiteSpace("${{ inputs.release_title }}")) {
            $args += @("-ReleaseTitle", "${{ inputs.release_title }}")
          }

          & powershell @args

      - name: Upload Desktop Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-release-${{ inputs.channel }}
          path: |
            release/out/desktop/**
            dist/**
          if-no-files-found: error

      - name: Print Published Download URLs
        if: ${{ inputs.publish_pages }}
        shell: pwsh
        run: |
          $versionLine = Select-String -Path pubspec.yaml -Pattern '^version:\s*(\d+\.\d+\.\d+)\+\d+\b'
          if ($null -eq $versionLine -or $versionLine.Matches.Count -eq 0) {
            throw "Could not parse version name from pubspec.yaml"
          }
          $versionName = $versionLine.Matches[0].Groups[1].Value.Trim()
          $channel = "${{ inputs.channel }}"
          Write-Host "Published channel: $channel"

          Write-Host "Latest installer:"
          Write-Host "https://sunkenintime.github.io/icarus/downloads/windows/$channel/icarus-setup-latest.exe"
          Write-Host "Versioned installer:"
          Write-Host "https://sunkenintime.github.io/icarus/downloads/windows/$channel/icarus-setup-$versionName.exe"
          Write-Host "Updater manifest:"
          Write-Host "https://sunkenintime.github.io/icarus/updates/windows/$channel/app-archive.json"

      - name: Commit Version And Metadata Changes
        if: ${{ github.ref_type == 'branch' }}
        shell: pwsh
        run: |
          $changes = git status --porcelain -- pubspec.yaml lib/const/settings.dart release/metadata
          if ([string]::IsNullOrWhiteSpace(($changes | Out-String))) {
            Write-Host "No version or metadata changes to commit."
            exit 0
          }

          $versionLine = Select-String -Path pubspec.yaml -Pattern '^version:\s*(\d+\.\d+\.\d+\+\d+)\b'
          if ($null -eq $versionLine -or $versionLine.Matches.Count -eq 0) {
            throw "Could not parse full version from pubspec.yaml"
          }
          $version = $versionLine.Matches[0].Groups[1].Value.Trim()

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pubspec.yaml lib/const/settings.dart release/metadata
          git commit -m "chore(release): desktop $version"
          git push origin HEAD:${{ github.ref_name }}
